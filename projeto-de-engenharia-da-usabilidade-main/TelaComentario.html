<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notee - Avaliação de Música</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Anton&family=Open+Sans:wght@300;400;600;700&family=Montserrat:wght@900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="style2.css">
</head>

<body>

    <header class="cabecalho-principal">
        <div class="cabecalho-esquerdo">
            <img src="imagens/Note-Logo.png" alt="Logo Notee" class="imagem-logo">
        </div>

        <nav class="navegacao-cabecalho">
            <a href="tela_albuns.html" class="item-navegacao">Início</a> 
            <a href="tela_artistas.html" class="item-navegacao">Artistas</a>
            <a href="fanClube.html" class="item-navegacao">Fã Clube</a>
            <a href="tela_favoritos.html" class="item-navegacao">Favoritos</a>
            <a href="config.html" class="item-navegacao">Configurações</a>
        </nav>

        <div class="cabecalho-direito">
            <i class="bi bi-universal-access icone-acessibilidade"></i>
            <i class="bi bi-search icone-busca"></i>
            <a href="perfil.html" style="color: inherit;"><i class="bi bi-person-circle icone-usuario"></i></a>
        </div>
        </div>
    </header>

    <div class="container-geral-com-lateral">
        <aside class="menu-lateral">
            <div class="grupo-lateral-topo">
                <a href="tela_albuns.html" class="item-lateral-circular"><i class="bi bi-house-door-fill"></i></a>
                <a href="tela_albuns.html" class="item-lateral-circular"><i class="bi bi-arrow-left"></i></a>
                <a href="config.html" class="item-lateral-circular"><i class="bi bi-gear-fill"></i></a>
            </div>

            <div class="grupo-lateral-rodape">
                <a href="perfil.html" class="item-lateral-circular"><i class="bi bi-person-fill"></i></a>
                <a href="index.html" class="item-lateral-circular"><i class="bi bi-box-arrow-left"></i></a>
            </div>
        </aside>

        <main class="content-container">
            <div class="layout-album">
                <aside class="detalhes-album">
                    <div class="capa-album-grande"></div>

                    <h1 class="titulo-album">SKINNY</h1>
                    <p class="autor-album">Billie Eilish</p>

                    <div class="box-avaliacao">
                        <span>Avaliação:</span>
                        <div class="estrelas">
                            <i class="bi bi-star-fill ativa"></i>
                            <i class="bi bi-star-fill ativa"></i>
                            <i class="bi bi-star-fill ativa"></i>
                            <i class="bi bi-star-fill"></i>
                            <i class="bi bi-star-fill"></i>
                        </div>
                    </div>

                    <div class="info-adicional">
                        <p><strong>Gênero:</strong> Pop</p>
                        <p><strong>Ano de lançamento:</strong> 2024</p>
                    </div>

                    <div class="streaming-section">
                        <p class="label-ouca">Ouça em:</p>
                        <div class="icones-streaming">
                            <a href="https://open.spotify.com/intl-pt/track/1CsMKhwEmNnmvHUuO5nryA?si=c9f7d9b09f29456d"
                                target="_blank" rel="noopener noreferrer">
                                <span class="stream-icon spotify"><i class="bi bi-spotify"></i></span>
                            </a>
                        </div>
                    </div>

                    <div class="botoes-acao">
                        <button class="btn-circular"><i class="bi bi-chevron-left"></i></button>
                        <button class="btn-circular"><i class="bi bi-share-fill"></i></button>
                        <button class="btn-circular btn-favorito-album"><i class="bi bi-heart"></i></button>
                    </div>
                </aside>

                <section class="comentarios-area">
                    <div id="comentarios-lista" class="comentarios-lista"></div>
                </section>
            </div>

            <footer class="barra-comentario">
                <input id="comentario" type="text" placeholder="Digite aqui o que você achou desta música..." class="input-opiniao">
                <div id="avaliacao" class="estrelas-comentario">
                    <i class="bi bi-star-fill estrela-comentario-interativa" data-valor="1"></i>
                    <i class="bi bi-star-fill estrela-comentario-interativa" data-valor="2"></i>
                    <i class="bi bi-star-fill estrela-comentario-interativa" data-valor="3"></i>
                    <i class="bi bi-star-fill estrela-comentario-interativa" data-valor="4"></i>
                    <i class="bi bi-star-fill estrela-comentario-interativa" data-valor="5"></i>
                </div>
                <button onclick="ComentarMusica()" class="btn-enviar-avaliacao" title="Enviar Avaliação">
                    <i class="bi bi-send-fill"></i>
                </button>
            </footer>
        </main>
        
    </div>

    <script src="script.js"></script>

</body>

</html>
